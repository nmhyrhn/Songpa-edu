<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title> 자바스크립트 실습 과제 </title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .mission-box {
            border: 2px dashed #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .dark-mode {
            background-color: #222;
            color: #fff;
        }

        /* 실습 3: 다크모드 버튼 스타일 */
        #theme-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        /* 실습 4: 인스타 좋아요 스타일 */
        .insta-box {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        .heart {
            color: red;
            margin-right: 10px;
        }

        /* 실습 6: 토스트 알림창 스타일 */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            /* 기본적으로 숨김 */
        }

        #save-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>💻 JavaScript 실습!</h1>
    <p>개발자 도구(F12) 콘솔(Console) 창을 열어두고 <code>00_practice_assignments.js</code> 파일에서 실습을 진행하세요!</p>

    <!-- 다크 모드 토글 버튼 -->
    <div class="mission-box">
        <h3>[실습 3] 다크 모드</h3>
        <button id="theme-btn">🌙 다크 모드 켜기</button>
    </div>

    <!-- 좋아요 카운터 -->
    <div class="mission-box">
        <h3>[실습 4] '좋아요' 카운터 만들기</h3>
        <div class="insta-box">
            <span class="heart" id="heart-btn">♡</span>
            좋아요 <span id="like-count">0</span>개
        </div>
    </div>

    <!-- 토스트 알림창 -->
    <div class="mission-box">
        <h3>[실습 6] 3초 펑! 토스트 알림창 띄우기</h3>
        <button id="save-btn">💾 내 정보 저장하기</button>
        <!-- 나중에 띄워질 토스트 알림창 -->
        <div id="toast">✅ 저장이 성공적으로 완료되었습니다!</div>
    </div>

    <!-- JS 파일 연결 -->
    <script src="./00_practice_assignments.js"></script>
</body>

</html>
