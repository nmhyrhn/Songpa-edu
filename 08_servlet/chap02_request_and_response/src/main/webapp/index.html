<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GET POST 요청 테스트</title>
</head>
<body>

    <h1>서블릿 요청 테스트</h1>
    <h3>GET 요청 보내기 (a 태그 사용)</h3>
    <a href="/request-service">GET 방식으로 서블릿 호출</a>

    <hr>

    <h3>POST 요청 보내기(form 태그 사용)</h3>
    <form action="/request-service" method="POST">
        <button type="submit">POST 방식으로 서블릿 호출</button>
    </form>

</body>
</html>
