<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect } = React;
const API_URL = 'https://pokeapi.co/api/v2/pokemon';

function ItemList() {
    const [pokemons, setPokemons] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        const fetchAllPokemonData = async () => {
            try {
                // 1. 최초 목록 가져오기
                const response = await fetch(API_URL);
                const data = await response.json();

                // 2. 상세 정보 fetch Promise 배열 만들기
                const detailPromise = data.results.map(async (pokemon) => {
                    const response = await fetch(pokemon.url);
                    return response.json();
                });

                // 3. 모든 상세 정보가 올 때까지 기다리기
                const detailedPokemons = await Promise.all(detailPromise);

                // 4. 상태 업데이트
                setPokemons(detailedPokemons);
            } catch (error) {
                console.error("포켓몬 정보를 가져오는데 실패", error);
            } finally {
                setLoading(false);
            }
        };

        fetchAllPokemonData();
    }, []);

    if (loading) return <h1>포켓몬 잡는 중...</h1>;

    return (
        <div className="pokemon-list">
            {pokemons.map(pokemon => (
                <div key={pokemon.id} className="item">
                    <h3>{pokemon.name}</h3>
                    <img 
                        src={pokemon.sprites.other.dream_world.front_default} 
                        alt={pokemon.name} 
                        style={{ width: '100px' }}
                    />
                </div>
            ))}
        </div>
    );
}


function App () {
    return (
        <>
            <h1>포켓몬 도감</h1>
            <ItemList />
        </>
    )
}

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
</body>
</html>
