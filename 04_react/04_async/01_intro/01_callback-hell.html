<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>콘솔 확인!</h1>

    <script>

        function sayHello() {
            console.log('3초 뒤에 음식이 나왔습니다.');
        };

        console.log('햄버거를 주문합니다.');
        setTimeout(sayHello, 3000);
        console.log('감자튀김을 주문합니다.');

        function increase(number, callback) {
            setTimeout(() => {
                const result = number + 10;
                console.log(result);
                if (callback) {
                    callback(result);
                }
            }, 1000);
        }

        console.log('작업 시작..');
        // 0부터 시작해서 10씩 3번 더하는 작업을 순차적으로 실행하고 싶을 때...
        increase(0, (result) => {
            increase(result, (result) => {
                increase(result, (result) => {
                    console.log('모든 작업이 끝났습니다.');
                });
            });
        });
    </script>
</body>
</html>
