<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- react -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- babel cdn -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  
    <!-- axios cdn -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>  
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect } = React;

        // 요청 URL : https://api.github.com/emojis

        // 사용자의 입력을 받고, '검색' 이벤트가 발생했음을 부모에게 알린다.
        function SearchBox ({onSearch}) {

            const [inputText, setInputText] = useState('');

            const handleSearchClick = () => {
              onSearch(inputText); //부모로부터 받은 함수에 현재 입력값을 넣어 실행
            };

            
            return (
                <>
                    <input 
                        type="text"
                        placeholder='이모지 이름을 입력하세요'
                        value={inputText}
                        onChange={e => setInputText(e.target.value)}
                    />
                    <button onClick={handleSearchClick}>검색</button>
                </>
            );
        }

        // 부모가 주는 상태에 따라 화면을 다르게 보여준다.
        function ImageBox({ imgUrl, loading }) {
    if (loading) return <p>로딩 중...</p>;
    if (!imgUrl) return <p>이모지를 검색해주세요</p>;

    return (
        <div style={{ marginTop: '20px' }}>
            <img src={imgUrl} alt="emoji" style={{ width: '100px' }} />
        </div>
    );
}

        // 모든 데이터와 상태 관리(로딩, 전체 이모지 목록, 검색 결과 URL)를 관리
        // API 통신을 책임지고, 자식들의 행동에 따라 상태를 업데이트 한다.
        function App() {

            const [loading, setLoading] = useState(true);   // 로딩상태
            const [emojis, setEmojis] = useState(null);     // 전체 이모지 목록
            const [imgUrl, setImgUrl] = useState(null);     // 검색 결과 이미지 URL

            useEffect(() =>{
                // 마운트시 딱 한 번 api 호출해서 전체 이모지 목록을 가져온다.
                async function fetchEmojis() {
                  try{
                    const response = await axios.get('https://api.github.com/emojis');
                    setEmojis(response.data); // 가져온 데이터를 state에 저장
                  } catch(error) {
                    console.error(error);
                  } finally{
                    setLoading(false); // 로딩 완료
                  }
                }
                fetchEmojis();
            }, [])

            // 검색된 이모지 이름을 이용하여 일치하는 이미지를 찾아, imgUrl 설정 
            const handleSearch = (emojiName) => {
              if(emojis && emojis[emojiName]) {
                setImgUrl(emojis[emojiName]); //주소가 있으면 업데이트
              } else {
                alert('이모지를 찾을 수 없습니다.');
                setImgUrl(null);
              }
            }

            return (
                <>
                    <h1>이모지 검색기</h1>
                    <SearchBox onSearch={handleSearch}/>
                    <br/>
                    <ImageBox imgUrl={imgUrl} loading={loading}/>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
</body>
</html>
