<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useCallback } = React;

        function Square({genSquareStyle}) {
            console.log('자식 컴포넌트(Square) 렌더링');

            // 부모가 준 스타일을 저장할 state
            const [style, setStyle] = useState({});

            useEffect(() => {
                console.log('자식 useEffect 실행(스타일 변경됨)');
                setStyle(genSquareStyle());
            }, [genSquareStyle])

            return <div style={style}></div>;
        }

        function App () {

            const [size, setSize] = useState(200);
            const [isDark, setIsDark] = useState(false);

            const genSquareStyle = useCallback(() => {
                return {
                    backgroundColor: 'orangered',
                    width: `${size}px`,
                    height: `${size}px`
                };
            }, [size])

            // size state를 이용해 스타일 객체를 만드는 함수 정의
            // const genSquareStyle = () => {
            //     return {
            //         backgroundColor: 'orangered',
            //         width: `${size}px`,
            //         height: `${size}px`
            //     };
            // };

            return (
                <>
                    <div style={{backgroundColor: isDark? 'black' : 'white'}}>
                        <input 
                            type="range" min="100" max="300"
                            onChange={e => setSize(parseInt(e.target.value))}
                        />
                        <button onClick={() => setIsDark(!isDark)}>테마 변경</button>
                        <Square genSquareStyle={genSquareStyle} />
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
</body>
</html>
