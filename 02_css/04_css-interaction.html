<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인터랙션</title>

  <style>
    .button {
      display: inline-block;
      padding: 15px 30px;
      background-color: lightgray;
      margin: 20px;
      color: black;
      text-decoration: none;
      border-radius: 10px;
    }

    /*hover: 마우스 커서를 올렸을 떄의 상태의 선택*/
    .button:hover {
      background-color: rgb(165, 75, 75);
      transform: scale(1.1);
    }
  </style>

</head>
<body>
  <h1>마우스 반응과 부드러운 효과</h1>
  <p>가상 클래스 선택자(:hover)와 트랜지션(transition)을 이용해 인터랙션 할 수 있다.</p>

  <a href="#" class="button">마우스를 올려보세요!</a>
</body>
</html>
