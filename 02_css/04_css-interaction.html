<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인터랙션</title>

  <style>
    .button {
      display: inline-block;
      padding: 15px 30px;
      background-color: lightgray;
      margin: 20px;
      color: black;
      text-decoration: none;
      border-radius: 10px;

      transition: all 0.3s ease; /*모든 속성의 변화에 0.3초의 부드러운 전환 효과를 적용*/
    }

    /*1. hover: 마우스 커서를 올렸을 떄의 상태의 선택*/
    .button:hover {
      background-color: rgb(165, 75, 75);
      color: white;
      /*transform:요소의 모양 변형*/
      transform: translateY(-5px);
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
    }

    /*2. :active: 마우스 버튼을 누를 때의 상태 선택*/
    .button:active {
      background-color: rgb(120, 50, 50);
      transform: translateY(0);
      box-shadow: none;
    }
  </style>

</head>
<body>
  <h1>마우스 반응과 부드러운 효과</h1>
  <p>가상 클래스 선택자(:hover)와 트랜지션(transition)을 이용해 인터랙션 할 수 있다.</p>

  <a href="#" class="button">마우스를 올려보세요!</a>
</body>
</html>
