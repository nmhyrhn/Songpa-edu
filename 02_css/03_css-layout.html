<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .container {
      border: 3px solid #333;;
    }

    .item {
      color: white;
      padding: 10px;
      text-align: center;
    }

    .red {
      background-color: red;
    }

    .green {
      background-color: green;
    }

    .blue {
      background-color: blue;
    } 

    .flex-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 150px;
    }

    .grid-container {
      display: grid;
      /*사용 가능한 공간을 1:1:1 비율로 나눈 3개의 열을 만듦 */
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .grid-container .item:first-child {
      grid-column: 1 / 3; /*첫 번째 아이템이 2개의 열을 차지하도록 설정*/
    }

    .position-container {
      position: relative;
      height: 200px;
    }

    .position-container .blue {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 100px;
      height: 100px;
    }

    .position-container .green {
      position: absolute;
      top: 65px;
      left: 100px;
      width: 100px;
      height: 100px;
    }

  </style>

</head>

<body>

  <h1>1. Flexbox로 배치하기 (가장 많이 사용!)</h1>

  <div class="container flex-container">
    <div class="item red">Item 1</div>
    <div class="item green">Item 2</div>
    <div class="item blue">Item 3</div>
  </div>
  
  <h1>2. Grid로 배치하기</h1>
  <div class="container grid-container">
    <div class="item red">Item 1</div>
    <div class="item green">Item 2</div>
    <div class="item blue">Item 3</div>
    <div class="item red">Item 4</div>
    <div class="item green">Item 5</div>
  </div>
  
  <h1>3. Position으로 배치하기</h1>
  <div class="container position-container">
    <div class="item blue">Absolute Position</div>
    <div class="item green">Absolute Position</div>
  </div>
  
</body>
</html>
