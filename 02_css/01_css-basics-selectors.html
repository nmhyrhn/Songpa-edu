<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선택자</title>

  <!--외부 스타일 시트-->
  <link rel="stylesheet" href="style.css">

  <!--내부 스타일 시트-->
  <!-- <style>
    /*
      css의 기본 문법
      선택자 {
        속성1: 값1;
        속성2: 값2;
        ...
      }
    */

    태그 선택자 : HTML 태그 이름을 그대로 사용
    h2{
      color: red;
    }

    /*클래스 선택자 : 점(.)으로 시작. 여러 요소에 '별명'을 붙여 그룹으로 꾸밀 떄 사용*/
    .highlight-text {
      background-color: aquamarine;
    }

    /*아이디 선택자 : 해시(#)로 시작. 하나의 요소에만 적용*/
    #blue-text {
      color: blue;
    } 

    /**후손 선택자 : 띄어쓰기로 구분. 특정 요소 '안에 이는' 모든 후손을 선택*/
    #lecture-list li {
      font-weight: bold;
    }

    /**자손 선택자 : > 기호로 구분. 특정 요소의 '버로 아래 자식'만 선택*/
    body > p {
      font-size: 20px;
    }

  </style> -->

</head>
<body>
  <h1>CSS 선택자</h1>
  <p>CSS는 HTML 뼈대에 디자인 옷을 입히는 언어이다. 내가 꾸미고 싶은 대상을 정학히 '선택'하는 것이 가장 중요하다.</p>


  <h2>오늘의 강의 목록</h2>
  <ul id="lecture-list">
    <li>태그 선택자</li>
    <li class="highlight-text">클래스 선택자</li>
    <li id="blue-text">아이디 선택자</li>
    <li class="highlight-text">후손/자손 선택자</li>
  </ul>

  <p style="color: green; font-style: italic;">이 문단은 인라인 스타일로 직접 꾸몄습니다.</p>
</body>
</html>
