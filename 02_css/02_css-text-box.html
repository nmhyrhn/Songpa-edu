<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글자와 상자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Hi+Melody&display=swap" rel="stylesheet">

  <style>
    body {
  font-family: "Gaegu", sans-serif;
  line-height: 1.8;
}

  h1 {
    color: #ff69b4;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
  }

  .box {
    border: 2px dashed #ff69b4;
    background-color: #fff0f5;
    width: 300px;
    height: 150px;
    padding: 20px;
    margin: 20px;
  }

  .rounded-box {
    background-color: rgb(184, 154, 213);
    color: white;
    padding: 10px;
    margin: 10px;
    border-radius: 15px;
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
  }

  </style>

</head>

<body>
  <h1>글자와 상자 꾸미기</h1>
  <p>CSS의 핵심은 글자를 보기 좋게 만들고, 각 요소가 차지하는 '상자'의 모양과 간격을 조절하는 것이다.</p>

  <div class="box">
    이것은 기본 상자입니다. 안쪽 여백(padding), 테두리(border), 바깥 여백(margin)을 가지고 있습니다.
  </div>

  <div class="rounded-box">
    이것은 모서리가 둥글고 그림자가 있는 상자입니다.
  </div>

</body>
</html>
