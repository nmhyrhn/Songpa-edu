<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>링크와 폼</title>
</head>
<body>
  <h1>하이퍼링크로 페이지 연결하기</h1>

  <h2>다른 웹사이트로 이동하기</h2>
  <ul>
    <li><a href="https://google.com" target="_blank">구글로 이동</a></li>
    <li><a href="https://naver.com">네이버로 이동</a></li>
  </ul>

  <h2>같은 폴더의 다른 파일로 이동하기</h2>
  <ul>
    <li><a href="01_text-and-list.html">글자와 목록 페이지로 이동</a></li>
    <li><a href="02_table-and-media.html">표와 미디어 페이지로 이동</a></li>
  </ul>

  <h2>페이지 내부의 특정 위치로 이동하기</h2>
  <p>
    <a href="#guestbook">페이지 하단의 방명록으로 바로가기</a>
  </p>
  <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
  <hr>

  <h1>폼(form)으로 사용자 정보 입력 받기</h1>
  <!-- form 태그는 사용자로부터 정보를 입력받는 양식을 만들 때 사용한다. -->
  <!-- action: 폼이 제출될 때 데이터를 처리할 URL, method: 데이터를 전송하는 방식 -->
  <form action="#" method="POST">
    <!-- fieldset 태그는 관련된 입력 요소들을 그룹화할 때 사용한다. -->
    <fieldset>
      <!-- legend 태그는 fieldset의 제목을 나타낸다. -->
      <legend id="guestbook">방명록 작성</legend>
      <div>
        <!-- label 태그는 input 요소의 설명을 제공한다. for 속성은 연결된 input 요소의 id와 일치해야 한다. -->
        <label for="user-id">아이디:</label>
        <!-- input 태그는 사용자로부터 텍스트를 입력받는 요소이다. -->
        <input id="user-id" name="user-id" placeholder="이름을 입력하세요">
      </div>

      <div>
        <label for="user-pw">비밀번호:</label>
        <input id="user-pw" name="user-pw" type="password" placeholder="비밀번호를 입력하세요">
      </div>

      <div>
        <p>가입 경로 (하나만 선택):</p>
        <input type="radio" id="route-internet" name="route" value="internet">
        <label for="route-internet">인터넷 검색</label>

        <input type="radio" id="route-friend" name="route" value="friend">
        <label for="route-friend">지인 추천</label>
      </div>

      <div>
        <p>관심 분야 (복수 선택 가능):</p>
        <input type="checkbox" id="interest-tech" name="interest" value="tech">
        <label for="interest-tech">기술</label>

        <input type="checkbox" id="interest-design" name="interest" value="design">
        <label for="interest-design">디자인</label>

        <input type="checkbox" id="interest-marketing" name="interest" value="marketing">
        <label for="interest-marketing">마케팅</label>
      </div>

      <div>
        <label for="memo">하고싶은 말:</label> <br>
        <textarea id="memo" name="memo" rows="4" cols="50" placeholder="메모를 입력하세요"></textarea>
      </div>

      <button type="submit">작성 완료</button>
      <button type="reset">초기화</button>
    </fieldset>
  </form>


</body>
</html>
